interface:
  display_name: "Prompt Skill"
  short_description: "Global gate for reusable prompts and durable AI instructions"
  default_prompt: >-
    Always use $prompt-skill whenever the requested work creates, reviews, edits, repairs, standardizes, tests, summarizes, optimizes, or changes a reusable prompt or durable AI instruction, including system/developer/agent/Custom GPT instructions, image-generation prompts, templates, and prompts embedded in code, config, or workflows. This is the 100% global gate for prompt tasks and the 100% global prompt-task gate across projects. Ordinary prose does not trigger it merely because it is text. Stay inline on the current model, load the owning code executor for prompt-in-code edits, present the completed prompt first, then start the mandatory independent Ending lifecycle. Log failure before a repair child and use a different verifier for the corrected prompt.
