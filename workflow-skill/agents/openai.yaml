interface:
  display_name: "Workflow"
  short_description: "Executes admitted complex delegated routes"
  default_prompt: >-
    $workflow-skill: eligible text/code producers use matching Obsidian project context and try Spark first (easy low; complex high), with the selected 5.6 pair as zero-result operational fallback. Published output returns immediately. Ending Real alone records receipt-backed pass or quality/correctness failure; failure starts a new 5.6 repair lifecycle and a different verifier. Local model_experience.json stays legacy read-only. Multi-node JSON and savings need separate end-to-end admission. Ineligible work stays inline. Every task starts an independent Ending subagent; isolated logs/docs run in parallel. Final needs PASS or BLOCKED. Ending time is outside first-result time. No hook or exposed machine plan.
