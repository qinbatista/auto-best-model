interface:
  display_name: "Workflow"
  short_description: "Executes admitted complex delegated routes"
  default_prompt: >-
    $workflow-skill: every eligible text/code producer uses matching Obsidian context and the saved highest-family ladder, trying the optional priority producer first (easy low; complex high) with the selected quality pair as zero-result fallback. Ordinary tasks do not scan or refresh the model cache; only an explicit user model-update may refresh from local models_cache.json, never network, and unavailable cache keeps the saved ladder. Published output returns immediately. Start Ending with the producer receipt; its terminal event automatically records PASS/FAIL learning. Quality failure starts a new quality-pair repair lifecycle and a different verifier. The broad Model Switch page is the sole current contextual experience authority. Multi-node savings need separate proof. Every task has independent Ending; isolated logs/docs may run in parallel. Final needs PASS or BLOCKED. No hook or visible machine plan.
