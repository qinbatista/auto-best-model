interface:
  display_name: "Workflow"
  short_description: "Executes admitted complex delegated routes"
  default_prompt: >-
    $workflow-skill: every eligible text/code producer uses matching Obsidian context and executes the saved highest-family quality pair. One Real PASS keeps it; two PASS results downgrade one rung; quality FAIL upgrades one; zero-result operational failure may use one stronger fallback. Spark is schedule-only for disjoint sources. Ordinary tasks never refresh the model cache; only explicit user model-update may use local models_cache.json, never network. Publish output immediately, then start independent <=60s evidence-only Ending with the producer receipt and return without waiting. Its terminal event records PASS/FAIL learning; concurrent change records BLOCKED without gating the result. Benchmark exactly Direct task versus Auto task and Direct task versus Auto task+Ending; controller is excluded diagnostic. No hook or visible machine plan.
