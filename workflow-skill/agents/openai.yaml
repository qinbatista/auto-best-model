interface:
  display_name: "Workflow"
  short_description: "Executes admitted complex delegated routes"
  default_prompt: >-
    $workflow-skill: eligible small low-risk edits try Spark; other producers use matching Obsidian context and the saved highest-family quality pair. One Real PASS keeps it, two PASS downgrade one rung, and quality FAIL upgrades one; operational failure may use one stronger fallback. Publish output after Quick Check. For verification-needed work, build ending_verification_plan.py and create one scored/modelled persistent task per independent real check; all must PASS. FAIL records exact evidence, creates a separate repair task, and then fresh verification, up to three attempts. BLOCKED is not verified. Local lifecycle and receipt-backed Obsidian learning record outcomes. Never self-verify or use a same-task subagent.
