interface:
  display_name: "Task Analyze"
  short_description: "Routing, benchmarks, maintenance, and admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: every eligible text/code producer reads the matching broad Obsidian Model Switch page and saved catalog ladder, then runs the optional priority producer first (easy low; complex high) with the selected quality pair as zero-result fallback. Ordinary tasks never scan the model cache. Only an explicit user model-update refreshes local models_cache.json; missing cache keeps the saved ladder and no network fetch is allowed. Run a Mini Test after code: smallest local smoke for light work, or syntax/name/reference checks for API, large-file, expensive, or side-effect-heavy work. Present immediately, then create and title a separate End Task-{related task} thread, link it, and return without waiting or a same-task subtask. Structural skill changes rerun simple/medium/complex benchmarks. Load prompt-skill for reusable instructions. Exact read-only is bounded inline. Final needs PASS or BLOCKED. No hook.
