interface:
  display_name: "Task Analyze"
  short_description: "Routing, benchmarks, maintenance, and admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: eligible text/code entry parent first pipes task once, non-TTY, to ~/.codex/skills/task-analyze-skill/scripts/obsidian_adaptive_model_runner.py before owning skills, memory, or files; one <=60s wait, publish the child result, return. No parent implementation or repeated polls. Saved ladder only; explicit user model-update may refresh local cache, never network. Auto Priority easy-low/complex-high, quality fallback only after zero-result operational failure. Selected producer owns skills, edits, and Mini Test. Result; create/title/link End Task if thread tools exist, else emit handoff and return for outer host. Never inspect app-server or self-run Ending. Ending is <=60s evidence-only and never gates. Benchmark real simple/medium/complex: every Direct and Global entry is gpt-5.6-sol|ultra; Direct stays fixed, Global receipt proves adaptive child; foreground token/time wins exclude separate Ending cost. Exact read-only stays bounded inline. Final PASS/BLOCKED is Ending-only. No hook.
