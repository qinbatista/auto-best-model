interface:
  display_name: "Task Analyze"
  short_description: "Routing, benchmarks, maintenance, and admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: text/code pipes exact user text once via /usr/bin/python3 obsidian_adaptive_model_runner.py, non-TTY, before skills, memory, or files; except one-source exact read-only. Wait 60s; if session id resume once <=60s; return result or pending. NEVER spawn or read. Receipt-authorized nodes execute directly; never re-enter runner. Saved ladder; user model-update refreshes local cache; never fetch. Missing Obsidian uses saved cold start. Priority easy-low/complex-high; zero-result fallback. Two-three independent sources MUST route before reads: parallel receipts plus adaptive merge; dependent multi-file: one producer. Producer owns skills/files/Mini Test. Create/title/link End Task when available, else handoff; never subtask, emulate, wait, or self-verify. Ending <=60s and never gates. Benchmark 3 real tiers from gpt-5.6-sol|ultra: Direct fixed/no verify; Auto receipt proves child or graph; foreground and Ending separate; Complex shows stage pairs. Final PASS/BLOCKED Ending-only. No hook.
