interface:
  display_name: "Task Analyze"
  short_description: "Routing, benchmarks, maintenance, and admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: text/code pipes exact user text once via /usr/bin/python3 obsidian_adaptive_model_runner.py, non-TTY, before skills, memory, or files; except one-source exact read-only. Wait 60s; if session id, resume once <=60s; return result or pending. NEVER spawn or read. Receipt nodes execute; never re-enter. Use the saved pair: two Real PASS results downgrade one rung; quality FAIL upgrades one; zero-result operational failure uses one stronger fallback. Spark is schedule-only. Two-three sources cost-admit before reads: single producer or fused graph; dependent multi-file uses one producer. Producer owns skills/files/Mini Test. Create/title/link End Task when available; never subtask, emulate, wait, or self-verify. Ending <=60s and never gates. Benchmark three tiers from gpt-5.6-sol|ultra: Direct fixed/no verify; Auto receipt proves task child/graph; compare task vs task+Ending, excluding controller diagnostics. Final PASS/BLOCKED is Ending-only. No hook.
