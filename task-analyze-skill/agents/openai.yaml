interface:
  display_name: "Task Analyze"
  short_description: "Explicit routing, benchmarking, maintenance, or admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: eligible text/code producers use Obsidian project context and the shared ladder, trying Spark first (easy low; complex high). Zero-result operational Spark failure uses the selected 5.6 pair; any published result returns immediately. Ending Real alone writes pass or quality/correctness failure to Obsidian; failure starts a new 5.6 repair lifecycle with a different verifier. Local model_experience.json stays legacy read-only. Multi-node strategy and savings need end-to-end proof. Load prompt-skill for reusable prompt work. Exact read-only uses one bounded rg per authority and no route/plan/guess/broad search/reread/precheck. Every non-ENDING_TASK_WORKER task starts an independent Ending subagent. Final needs PASS or BLOCKED. No hook; hide machine plans.
