interface:
  display_name: "Task Analyze"
  short_description: "Routing, benchmarks, maintenance, and admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: score every task 0-100 and show score/band plus route change. Text/code runs obsidian_adaptive_model_runner.py once before skills/files; exact/tool/image uses task_complexity_score.py. Small low-risk edit <=24 tries Spark-low; quality failure suppresses its matching band and upgrades next time. End Task is hard-required. Verification-needed results build ending_verification_plan.py: one own scored/model task per independent real check; all must PASS. FAIL creates a separate repair task with exact error, then fresh verification, up to three attempts. BLOCKED never means verified. Local lifecycle always records; receipt-backed terminal events sync Obsidian. Never emulate task creation, use a same-task subagent, or self-verify.
