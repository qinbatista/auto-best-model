interface:
  display_name: "Task Analyze"
  short_description: "Routing, benchmarks, maintenance, and admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: every eligible text/code producer reads the matching broad Obsidian Model Switch page and the saved catalog ladder, then runs the optional priority producer first (easy low; complex high) with the selected quality pair as zero-result fallback. Ordinary tasks never scan the model cache. Only an explicit user model-update refreshes from local models_cache.json; a missing ladder bootstraps locally, unavailable cache keeps the saved ladder, and no network fetch is allowed. Project, task, module, file, symbol, and code stay record fields on the broad page; no hierarchy note is created. Return published output immediately; bind the producer receipt to independent Ending so its terminal event writes PASS/FAIL learning. Quality failure starts a new quality-pair repair with a different verifier. Multi-node savings need proof. Load prompt-skill for reusable instructions. Exact read-only is bounded inline. Final needs PASS or BLOCKED. No hook or visible machine plan.
