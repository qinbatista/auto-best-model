interface:
  display_name: "Task Analyze"
  short_description: "Explicit routing, benchmarking, maintenance, or admitted graph strategy"
  default_prompt: >-
    $task-analyze-skill: explicit routing/model strategy, admitted delegation/graphs, or maintenance/benchmarks only. Ordinary work stays inline. Prompt-artifact work is the one ordinary skill exception: always load prompt-skill and present the completed prompt before Ending Real; ordinary prose does not trigger it. Exact-scoped read-only work stays on the current model with no subagent/route. An exact named-source audit uses one bounded rg per authoritative file for every exact user-named target and direct definition, anchors named members directly, never adds enclosing-class/call-site anchors or guesses identifier families, answers once, presents now, and has no plan/unrelated-skill load/broad search/reread/full-file/pre-result check. Ending Real Verify reopens failure. Other work avoids full-skill load, memory, Workflow, children, receipts, and foreground verify. Delegation needs frozen Real-pass trial=false end-to-end evidence beating Direct in tokens and first-result time. Keep hookless; hide plans.
