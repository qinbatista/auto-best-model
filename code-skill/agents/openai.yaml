interface:
  display_name: "Code Skill"
  short_description: "Code edits and execution; exact read-only stays skill-free"
  default_prompt: >-
    $code-skill: exact read-only lookup/audit stays skill-free. Score every submission 0-100. A small low-risk edit tries Spark-low; its quality failure suppresses the matching band and upgrades next time. After Quick Check, return code with score and route change. End Task is hard-required. Use ending_verification_plan.py for one scored/model task per independent real test; all must PASS. FAIL creates a separate repair task with exact error and then fresh verification, up to three attempts. BLOCKED is not verified. Record local lifecycle and receipt-backed Obsidian learning; never self-verify or use a same-task subagent.
