interface:
  display_name: "Code Skill"
  short_description: "Code edits and execution; exact read-only stays skill-free"
  default_prompt: >-
    $code-skill: exact read-only lookup/audit stays skill-free. Implementation, edit, debug, refactor, or authored tests use the catalog-generated ladder. Try the optional priority producer first (easy low; complex high); only zero-result operational failure uses the selected contextual quality pair. Run the bounded Quick Check, then return published code immediately with PASS or SKIPPED evidence; no foreground verify. Start independent Ending in a separate End Task-{related task} thread with the producer receipt and return without waiting or a same-task subagent. The <=60s audit has no extra tests/API/questions/wait. A correctness/quality failure, new quality-pair repair lifecycle, or different verifier needs a new explicit user task. The terminal event automatically records PASS/BLOCKED learning. Local model_experience.json stays legacy read-only. Ending time is outside first-result time.
