interface:
  display_name: "Code Skill"
  short_description: "Code mutation or execution; exact read-only work stays skill-free"
  default_prompt: >-
    $code-skill: exact read-only lookup/audit stays skill-free. Implementation, edit, debug, refactor, or authored tests use the shared ladder and matching Obsidian project context. Try Spark first (easy low; complex high); only zero-result operational failure uses the selected 5.6 pair. Return published code immediately. Ending Real alone records pass or correctness/quality failure; log failure before a new 5.6 repair lifecycle, re-present, and use a different verifier. Local model_experience.json stays legacy read-only. Every task starts independent Ending; no foreground verify. Ending time is outside first-result time.
