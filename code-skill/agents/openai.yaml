interface:
  display_name: "Code Skill"
  short_description: "Code edits and execution; exact read-only stays skill-free"
  default_prompt: >-
    $code-skill: exact read-only lookup/audit stays skill-free. Implementation, edit, debug, refactor, or authored tests use matching Obsidian context and the catalog-generated ladder. Try the optional priority producer first (easy low; complex high); only zero-result operational failure uses the selected contextual quality pair. Before presenting code, run one bounded Quick Check: a smallest safe local smoke for light work, or syntax plus changed function/variable/import/reference checks for API, large-file, expensive, or side-effect-heavy work. Show CODE READY with PASS or SKIPPED evidence. Then create and rename a separate persistent thread exactly End Task-{related task}; pass the receipt and acceptance contract, link it, and return without waiting or using a same-task Ending subagent. The Ending thread records PASS/BLOCKED learning and project memory. Local model_experience.json stays legacy read-only. Quick Check is inside first-result time; Ending time is outside it.
