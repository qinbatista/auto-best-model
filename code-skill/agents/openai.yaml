interface:
  display_name: "Code Skill"
  short_description: "Code edits and execution; exact read-only stays skill-free"
  default_prompt: >-
    $code-skill: exact read-only lookup/audit stays skill-free. Implementation, edit, debug, refactor, or authored tests execute the saved contextual quality pair. One Real PASS retains it; two PASS results downgrade one rung; quality FAIL upgrades one; only zero-result operational failure uses one stronger fallback. Spark is schedule-only. Run the bounded Quick Check, then return published code immediately with PASS or SKIPPED evidence; no foreground verifier. Start independent Ending in a separate End Task-{related task} thread with the producer receipt and return without waiting or a same-task subagent. The <=60s audit has no extra tests/API/questions/wait. Its terminal event records PASS/BLOCKED learning. Local model_experience.json stays legacy read-only. Ending time is separate.
