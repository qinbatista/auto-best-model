interface:
  display_name: "Code Skill"
  short_description: "Code edits and execution; exact read-only stays skill-free"
  default_prompt: >-
    $code-skill: exact read-only lookup/audit stays skill-free. Implementation, edit, debug, refactor, or authored tests use matching Obsidian context and the catalog-generated ladder. Try the optional priority producer first (easy low; complex high); only zero-result operational failure uses the selected contextual quality pair. Return published code immediately. Start Ending with the producer receipt so its terminal event automatically records PASS/FAIL learning. Log correctness/quality failure before a new quality-pair repair lifecycle, re-present, and use a different verifier. Local model_experience.json stays legacy read-only. Every task starts independent Ending; no foreground verify. Ending time is outside first-result time.
