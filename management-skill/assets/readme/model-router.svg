<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1040" viewBox="0 0 1600 1040" role="img" aria-labelledby="title desc">
  <title id="title">Model and effort router</title>
  <desc id="desc">The selected model handles ordinary work inline. Full routing loads only for explicit or performance-admitted dependency work. Static floors and private verified experience choose model and effort; effort moves before model.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111f"/><stop offset="1" stop-color="#17223d"/></linearGradient></defs>
  <rect width="1600" height="1040" rx="30" fill="url(#bg)"/>
  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="70" y="92" fill="#f8fafc" font-size="48" font-weight="800">🤖 Model + effort router</text>
    <text x="70" y="136" fill="#94a3b8" font-size="24">Cold-start hints guide selection; comparable evidence reuses a dynamic learned pair.</text>
    <rect x="70" y="180" width="1460" height="130" rx="22" fill="#0d2e35" stroke="#2dd4bf" stroke-width="2"/>
    <text x="105" y="222" fill="#99f6e4" font-size="18" font-weight="800" letter-spacing="1.5">INLINE DEFAULT · ROUTING IS ADMITTED</text>
    <text x="105" y="262" fill="#f8fafc" font-size="25" font-weight="700">The selected pair does ordinary work. Full routing needs end-to-end proof.</text>
    <text x="105" y="292" fill="#cbd5e1" font-size="20">Example: Sol | ultra may stay inline; it never forces every downstream node to Sol | ultra.</text>

    <g>
      <rect x="70" y="355" width="710" height="250" rx="24" fill="#201a3a" stroke="#a78bfa" stroke-width="2"/>
      <text x="105" y="405" fill="#ddd6fe" font-size="20" font-weight="800">GPT-5.6-Sol · cold-start hint</text><text x="105" y="450" fill="#f8fafc" font-size="27" font-weight="750">Open-ended reasoning</text><text x="105" y="492" fill="#cbd5e1" font-size="21">Ambiguous architecture · missing context</text><text x="105" y="526" fill="#cbd5e1" font-size="21">difficult synthesis · complex judgment</text><rect x="105" y="550" width="610" height="36" rx="18" fill="#312e58"/><text x="410" y="575" text-anchor="middle" fill="#ede9fe" font-size="17" font-weight="700">normal ladder ends at Sol-ultra</text>
      <rect x="820" y="355" width="710" height="250" rx="24" fill="#102b3d" stroke="#38bdf8" stroke-width="2"/>
      <text x="855" y="405" fill="#bae6fd" font-size="20" font-weight="800">GPT-5.6-Terra · cold-start hint</text><text x="855" y="450" fill="#f8fafc" font-size="27" font-weight="750">Grounded integration</text><text x="855" y="492" fill="#cbd5e1" font-size="21">Source-rich changes · repository search</text><text x="855" y="526" fill="#cbd5e1" font-size="21">realistic verification · evidence review</text><rect x="855" y="550" width="610" height="36" rx="18" fill="#123b55"/><text x="1160" y="575" text-anchor="middle" fill="#e0f2fe" font-size="17" font-weight="700">after all Luna efforts · before Sol</text>
      <rect x="70" y="645" width="710" height="250" rx="24" fill="#123227" stroke="#34d399" stroke-width="2"/>
      <text x="105" y="695" fill="#a7f3d0" font-size="20" font-weight="800">GPT-5.6-Luna · cold-start hint</text><text x="105" y="740" fill="#f8fafc" font-size="27" font-weight="750">Normal dynamic ladder starts here</text><text x="105" y="782" fill="#cbd5e1" font-size="21">bounded work · result first · Ending records</text><text x="105" y="816" fill="#cbd5e1" font-size="21">all Luna efforts before Terra</text><rect x="105" y="840" width="610" height="36" rx="18" fill="#174936"/><text x="410" y="865" text-anchor="middle" fill="#d1fae5" font-size="17" font-weight="700">Luna-low → all Luna efforts</text>
      <rect x="820" y="645" width="710" height="250" rx="24" fill="#302716" stroke="#fbbf24" stroke-width="2"/>
      <text x="855" y="695" fill="#fde68a" font-size="20" font-weight="800">GPT-5.3-Codex-Spark</text><text x="855" y="740" fill="#f8fafc" font-size="27" font-weight="750">Spark-low obvious-only</text><text x="855" y="782" fill="#cbd5e1" font-size="21">tiny low-risk text/code/commands</text><text x="855" y="816" fill="#cbd5e1" font-size="21">then full normal fallback · never raise Spark</text><rect x="855" y="840" width="610" height="36" rx="18" fill="#4a3717"/><text x="1160" y="865" text-anchor="middle" fill="#fef3c7" font-size="17" font-weight="700">Spark-low + Luna-low→Sol-ultra fallback</text>
    </g>

    <rect x="70" y="935" width="1460" height="68" rx="20" fill="#111d32" stroke="#475569"/>
    <text x="105" y="977" fill="#f8fafc" font-size="21" font-weight="700">Downgrade effort first, then model</text><text x="590" y="977" fill="#cbd5e1" font-size="20">Freeze the best verified pair for each profile.</text><text x="1080" y="977" fill="#fbbf24" font-size="20" font-weight="700">A receipt—not a label—proves execution.</text>
  </g>
</svg>
