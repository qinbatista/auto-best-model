<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1160" viewBox="0 0 1400 1160" role="img" aria-labelledby="title desc">
  <title id="title">Three-tier lifecycle benchmark with and without the global skill</title>
  <desc id="desc">Simple, medium, and complex paired benchmarks. Without skill is blue main work only with zero verification. With skill is green main work followed by striped green background verification. Every tier compares logical tokens and full-session time.</desc>
  <defs>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.white{fill:#f8fafc}.muted{fill:#a9b6ca}.quiet{fill:#718096}.blue{fill:#3b82f6}.green{fill:#22c55e}.orange{fill:#fb923c}.label{font-size:15px;font-weight:700}.small{font-size:13px}.value{font-size:15px;font-weight:700}
    </style>
    <pattern id="greenVerify" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)"><rect width="12" height="12" fill="#123a2b"/><rect width="5" height="12" fill="#4ade80"/></pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".28"/></filter>
  </defs>

  <rect width="1400" height="1160" fill="#070d16"/>
  <rect x="38" y="34" width="1324" height="1092" rx="30" fill="#081728" filter="url(#shadow)"/>

  <text x="90" y="96" class="sans white" font-size="36" font-weight="780">Three-tier lifecycle A/B benchmark · FAIL</text>
  <text x="90" y="134" class="sans muted" font-size="18">2 pairs per tier · 12 main runs · 6 with-skill background verifies · all correctness checks PASS</text>

  <rect x="873" y="72" width="18" height="18" rx="5" class="blue"/><text x="901" y="87" class="sans muted" font-size="14">Without skill: main only</text>
  <rect x="1080" y="72" width="18" height="18" rx="5" class="green"/><text x="1108" y="87" class="sans muted" font-size="14">With skill: main</text>
  <rect x="1080" y="105" width="18" height="18" rx="4" fill="url(#greenVerify)"/><text x="1108" y="120" class="sans muted" font-size="14">With skill: verify behind</text>

  <rect x="82" y="170" width="1236" height="270" rx="22" fill="#111f35" stroke="#2b3d59" stroke-width="1.5"/>
  <text x="110" y="210" class="sans white" font-size="23" font-weight="760">1 · Simple exact-output task</text>
  <text x="110" y="238" class="sans muted" font-size="14">gpt-5.6-luna | low · 2 pairs · exact arithmetic JSON</text>
  <text x="1190" y="210" class="sans orange" font-size="17" font-weight="760">FAIL</text>
  <text x="110" y="275" class="sans white label">MEDIAN LOGICAL TOKENS</text>
  <text x="720" y="275" class="sans white label">MEDIAN FULL-SESSION TIME</text>
  <text x="110" y="311" class="sans muted small">WITHOUT · 13,017 · verify 0</text>
  <rect x="350" y="292" width="113" height="22" rx="8" class="blue"/>
  <text x="720" y="311" class="sans muted small">WITHOUT · 2.790s · verify 0</text>
  <rect x="960" y="292" width="136" height="22" rx="8" class="blue"/>
  <text x="110" y="355" class="sans muted small">WITH · main 19,044 · verify 19,115</text>
  <rect x="350" y="336" width="165" height="22" rx="8" class="green"/><rect x="515" y="336" width="165" height="22" rx="8" fill="url(#greenVerify)"/>
  <text x="720" y="355" class="sans muted small">WITH · main 3.291s · verify 3.456s</text>
  <rect x="960" y="336" width="161" height="22" rx="8" class="green"/><rect x="1121" y="336" width="169" height="22" rx="8" fill="url(#greenVerify)"/>
  <text x="110" y="404" class="sans orange" font-size="15" font-weight="720">Full lifecycle vs without: +193.2% tokens · +141.8% time</text>
  <text x="860" y="404" class="sans green" font-size="14" font-weight="700">STRIPED COST EXISTS ONLY WITH SKILL →</text>

  <rect x="82" y="462" width="1236" height="270" rx="22" fill="#111f35" stroke="#2b3d59" stroke-width="1.5"/>
  <text x="110" y="502" class="sans white" font-size="23" font-weight="760">2 · Medium single-method audit</text>
  <text x="110" y="530" class="sans muted" font-size="14">gpt-5.6-terra | medium · 2 pairs · one Python pricing method</text>
  <text x="1190" y="502" class="sans orange" font-size="17" font-weight="760">FAIL</text>
  <text x="110" y="567" class="sans white label">MEDIAN LOGICAL TOKENS</text>
  <text x="720" y="567" class="sans white label">MEDIAN FULL-SESSION TIME</text>
  <text x="110" y="603" class="sans muted small">WITHOUT · 14,860 · verify 0</text>
  <rect x="350" y="584" width="78" height="22" rx="8" class="blue"/>
  <text x="720" y="603" class="sans muted small">WITHOUT · 3.237s · verify 0</text>
  <rect x="960" y="584" width="94" height="22" rx="8" class="blue"/>
  <text x="110" y="647" class="sans muted small">WITH · main 20,893 · verify 42,069</text>
  <rect x="350" y="628" width="109" height="22" rx="8" class="green"/><rect x="459" y="628" width="221" height="22" rx="8" fill="url(#greenVerify)"/>
  <text x="720" y="647" class="sans muted small">WITH · main 4.370s · verify 7.054s</text>
  <rect x="960" y="628" width="125" height="22" rx="8" class="green"/><rect x="1085" y="628" width="205" height="22" rx="8" fill="url(#greenVerify)"/>
  <text x="110" y="696" class="sans orange" font-size="15" font-weight="720">Full lifecycle vs without: +323.7% tokens · +252.9% time</text>

  <rect x="82" y="754" width="1236" height="270" rx="22" fill="#111f35" stroke="#2b3d59" stroke-width="1.5"/>
  <text x="110" y="794" class="sans white" font-size="23" font-weight="760">3 · Complex six-file dependency audit</text>
  <text x="110" y="822" class="sans muted" font-size="14">gpt-5.6-sol | high · 2 pairs · trace pricing → discount → tax → service → API</text>
  <text x="1190" y="794" class="sans orange" font-size="17" font-weight="760">FAIL</text>
  <text x="110" y="859" class="sans white label">MEDIAN LOGICAL TOKENS</text>
  <text x="720" y="859" class="sans white label">MEDIAN FULL-SESSION TIME</text>
  <text x="110" y="895" class="sans muted small">WITHOUT · 30,869 · verify 0</text>
  <rect x="350" y="876" width="103" height="22" rx="8" class="blue"/>
  <text x="720" y="895" class="sans muted small">WITHOUT · 11.597s · verify 0</text>
  <rect x="960" y="876" width="126" height="22" rx="8" class="blue"/>
  <text x="110" y="939" class="sans muted small">WITH · main 55,269 · verify 43,443</text>
  <rect x="350" y="920" width="185" height="22" rx="8" class="green"/><rect x="535" y="920" width="145" height="22" rx="8" fill="url(#greenVerify)"/>
  <text x="720" y="939" class="sans muted small">WITH · main 17.584s · verify 12.775s</text>
  <rect x="960" y="920" width="191" height="22" rx="8" class="green"/><rect x="1151" y="920" width="139" height="22" rx="8" fill="url(#greenVerify)"/>
  <text x="110" y="988" class="sans orange" font-size="15" font-weight="720">Full lifecycle vs without: +219.8% tokens · +161.8% time</text>

  <rect x="82" y="1048" width="1236" height="52" rx="14" fill="#3b210d" stroke="#fb923c" stroke-width="1.2"/>
  <text x="700" y="1079" text-anchor="middle" class="sans white" font-size="16" font-weight="730">Truth: without skill stops after main (verify = 0). With skill returns main, then pays background verify tokens and time.</text>
  <text x="82" y="1130" class="sans quiet" font-size="13">All 18 sessions produced the expected output. Full-session timing only; first-visible-result latency was not measured. Logical tokens are not billing tokens.</text>
</svg>
