<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1060" viewBox="0 0 1400 1060" role="img" aria-labelledby="title desc">
  <title id="title">Lifecycle benchmark with main task and background verification cost</title>
  <desc id="desc">A dark benchmark panel comparing without-skill and with-skill lifecycle cost. Solid bar segments show main-task tokens and time. Striped segments behind them show the additional background Ending verification tokens and time. The skill uses more total time and tokens.</desc>
  <defs>
    <style>
      .sans{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.white{fill:#f8fafc}.muted{fill:#a9b6ca}.quiet{fill:#718096}.blue{fill:#3b82f6}.green{fill:#22c55e}.orange{fill:#fb923c}.label{font-size:16px;font-weight:700}.small{font-size:14px}.value{font-size:18px;font-weight:750}
    </style>
    <pattern id="blueVerify" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="12" fill="#172f55"/><rect width="5" height="12" fill="#60a5fa"/>
    </pattern>
    <pattern id="greenVerify" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="12" fill="#123a2b"/><rect width="5" height="12" fill="#4ade80"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".28"/></filter>
  </defs>

  <rect width="1400" height="1060" fill="#070d16"/>
  <rect x="38" y="36" width="1324" height="988" rx="30" fill="#081728" filter="url(#shadow)"/>

  <text x="90" y="105" class="sans white" font-size="36" font-weight="780">Real lifecycle A/B benchmark · FAIL</text>
  <text x="90" y="143" class="sans muted" font-size="18">Without global skill vs with global skill · lower is better · 6 paired runs · 24 independent sessions</text>

  <rect x="1000" y="78" width="18" height="18" rx="5" class="blue"/><text x="1028" y="93" class="sans muted" font-size="15">Without skill</text>
  <rect x="1160" y="78" width="18" height="18" rx="5" class="green"/><text x="1188" y="93" class="sans muted" font-size="15">With skill</text>
  <rect x="1000" y="112" width="18" height="18" rx="4" fill="url(#blueVerify)"/><text x="1028" y="127" class="sans muted" font-size="15">Striped = background verify</text>

  <rect x="82" y="178" width="1236" height="276" rx="22" fill="#111f35" stroke="#2b3d59" stroke-width="1.5"/>
  <text x="112" y="220" class="sans white" font-size="24" font-weight="750">Cohort logical tokens</text>
  <text x="112" y="250" class="sans muted" font-size="16">Solid main-task tokens + striped Ending verification tokens = complete lifecycle cost</text>
  <text x="1138" y="220" class="sans orange" font-size="18" font-weight="750">WITH SKILL +46.5%</text>

  <text x="112" y="310" class="sans white label">WITHOUT SKILL</text>
  <text x="112" y="335" class="sans muted small">Main 78,102 + Verify 78,585 (50.2%)</text>
  <rect x="390" y="292" width="310" height="30" rx="10" class="blue"/>
  <rect x="700" y="292" width="312" height="30" rx="10" fill="url(#blueVerify)"/>
  <text x="1030" y="314" class="mono white value">156,687 total</text>

  <text x="112" y="390" class="sans white label">WITH SKILL</text>
  <text x="112" y="415" class="sans muted small">Main 114,826 + Verify 114,727 (50.0%)</text>
  <rect x="390" y="372" width="455" height="30" rx="10" class="green"/>
  <rect x="845" y="372" width="455" height="30" rx="10" fill="url(#greenVerify)"/>
  <text x="1030" y="355" class="sans green" font-size="14" font-weight="700">VERIFY COST CONTINUES BEHIND MAIN →</text>
  <text x="1080" y="430" text-anchor="middle" class="mono white value">229,553 total</text>

  <rect x="82" y="478" width="1236" height="276" rx="22" fill="#111f35" stroke="#2b3d59" stroke-width="1.5"/>
  <text x="112" y="520" class="sans white" font-size="24" font-weight="750">Cohort full-session time</text>
  <text x="112" y="550" class="sans muted" font-size="16">Solid main-session time + striped Ending verification time; this is not first-visible-result latency</text>
  <text x="1138" y="520" class="sans orange" font-size="18" font-weight="750">WITH SKILL +25.7%</text>

  <text x="112" y="610" class="sans white label">WITHOUT SKILL</text>
  <text x="112" y="635" class="sans muted small">Main 19.153s + Verify 18.039s (48.5%)</text>
  <rect x="390" y="592" width="373" height="30" rx="10" class="blue"/>
  <rect x="763" y="592" width="351" height="30" rx="10" fill="url(#blueVerify)"/>
  <text x="1132" y="614" class="mono white value">37.192s total</text>

  <text x="112" y="690" class="sans white label">WITH SKILL</text>
  <text x="112" y="715" class="sans muted small">Main 22.138s + Verify 24.628s (52.7%)</text>
  <rect x="390" y="672" width="431" height="30" rx="10" class="green"/>
  <rect x="821" y="672" width="479" height="30" rx="10" fill="url(#greenVerify)"/>
  <text x="1060" y="730" text-anchor="middle" class="mono white value">46.766s total</text>

  <text x="82" y="805" class="sans white" font-size="24" font-weight="750">Median whole picture</text>
  <text x="82" y="833" class="sans muted" font-size="15">Stage medians are separate summaries; whole is the median of each run’s main + verify total.</text>

  <rect x="82" y="858" width="588" height="84" rx="18" fill="#10233f" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="108" y="889" class="sans blue" font-size="15" font-weight="750">WITHOUT SKILL</text>
  <text x="108" y="922" class="mono white" font-size="20" font-weight="750">Main 2.773s  +  Verify 2.778s  ·  Whole 6.091s</text>

  <rect x="694" y="858" width="624" height="84" rx="18" fill="#102d24" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="889" class="sans green" font-size="15" font-weight="750">WITH SKILL</text>
  <text x="720" y="922" class="mono white" font-size="20" font-weight="750">Main 3.322s  +  Verify 3.473s  ·  Whole 7.164s</text>

  <rect x="82" y="966" width="1236" height="1" fill="#2b3d59"/>
  <text x="82" y="990" class="sans orange" font-size="16" font-weight="750">Performance gate FAIL</text>
  <text x="265" y="990" class="sans muted" font-size="15">· all 12 main results PASS · all 12 verify results PASS · 0 reroutes · verify cost is real even though it runs after delivery</text>
  <text x="82" y="1018" class="sans quiet" font-size="13">Tiny exact-output workload. Full-session timing only. First-visible-result latency was not measured. Logical tokens are not billing tokens.</text>
</svg>
