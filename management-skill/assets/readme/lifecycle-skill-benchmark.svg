<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1550" viewBox="0 0 1800 1550" role="img" aria-labelledby="title desc">
  <title id="title">Real adaptive lifecycle A/B benchmark v26</title>
  <desc id="desc">Six real paired code tasks across simple, medium, and complex tiers. Both arms start GPT-5.6-Sol ultra. Direct has no verification. Auto separates the Sol controller, adaptive producer or schedule, and later striped Ending verification. All results are correct. Auto is 23.205 percent faster to first result but uses 31.153 percent more foreground tokens because controller overhead exceeds producer savings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071528"/>
      <stop offset="1" stop-color="#0c1830"/>
    </linearGradient>
    <pattern id="ending" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(36)">
      <rect width="9" height="18" fill="#f59e0b"/>
      <rect x="9" width="9" height="18" fill="#7c4a10"/>
    </pattern>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .title{font:800 38px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .subtitle{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#a9bad2}
      .cardtitle{font:800 25px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .route{font:600 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#9fb3cc}
      .section{font:800 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#dce8f7;letter-spacing:.4px}
      .label{font:650 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#d7e2f1}
      .value{font:700 16px ui-monospace,SFMono-Regular,Menlo,monospace;fill:#f8fafc}
      .note{font:550 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#9fb3cc}
      .win{font:800 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#59f3d0}
      .loss{font:800 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#ffb454}
      .kpi{font:850 29px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#f8fafc}
      .kpisub{font:650 15px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#a9bad2}
      .flow{font:850 20px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#eafffa;letter-spacing:.5px}
    </style>
  </defs>

  <rect width="1800" height="1550" fill="#070d17"/>
  <rect x="48" y="36" width="1704" height="1474" rx="38" fill="url(#bg)" stroke="#17365d" stroke-width="2" filter="url(#shadow)"/>

  <text x="100" y="105" class="title">Real A/B benchmark v26 · CORRECTNESS PASS · TOKEN STRATEGY FAIL</text>
  <text x="100" y="139" class="subtitle">gpt-5.6-sol | ultra in both arms · 6 pairs · 12/12 exact main results · 6/6 independent Ending PASS</text>
  <g transform="translate(920 145)">
    <rect width="18" height="18" rx="4" fill="#3b82f6"/><text x="28" y="15" class="note">Direct</text>
    <rect x="145" width="18" height="18" rx="4" fill="#8b5cf6"/><text x="173" y="15" class="note">Auto controller</text>
    <rect x="350" width="18" height="18" rx="4" fill="#18c6b3"/><text x="378" y="15" class="note">Producer / schedule</text>
    <rect x="590" width="18" height="18" rx="4" fill="url(#ending)"/><text x="618" y="15" class="note">Ending, Auto only</text>
  </g>

  <rect x="94" y="174" width="1612" height="58" rx="18" fill="#0c3a3a" stroke="#28e0c4" stroke-width="2"/>
  <text x="900" y="211" text-anchor="middle" class="flow">FINISH JOB FIRST  →  RETURN RESULT  →  BACKGROUND VERIFY IN A NEW END TASK</text>

  <!-- Simple -->
  <g transform="translate(94 260)">
    <rect width="1612" height="300" rx="28" fill="#101f38" stroke="#294568" stroke-width="2"/>
    <text x="30" y="43" class="cardtitle">Simple · normalize tags · 4/4 tests</text>
    <text x="1500" y="42" text-anchor="end" class="win">FIRST RESULT WIN</text>
    <text x="30" y="72" class="route">Auto route: Spark-low · 2 pairs / 4 main runs</text>
    <text x="30" y="108" class="section">LOGICAL TOKENS</text>
    <text x="760" y="108" class="section">FIRST-RESULT TIME</text>

    <text x="30" y="145" class="label">Direct</text><text x="120" y="145" class="value">291,499</text>
    <rect x="420" y="128" width="217" height="22" rx="11" fill="#3b82f6"/>
    <text x="30" y="185" class="label">Auto</text><text x="120" y="185" class="value">179,430 + 252,534</text>
    <rect x="420" y="168" width="133" height="22" rx="11" fill="#8b5cf6"/>
    <rect x="553" y="168" width="188" height="22" fill="#18c6b3"/>
    <rect x="741" y="168" width="68" height="22" rx="11" fill="url(#ending)"/>
    <text x="420" y="222" class="loss">Foreground 48.187% more</text>
    <text x="660" y="222" class="note">Ending +92,114</text>

    <text x="760" y="145" class="label">Direct</text><text x="855" y="145" class="value">134.659s</text>
    <rect x="1160" y="128" width="286" height="22" rx="11" fill="#3b82f6"/>
    <text x="760" y="185" class="label">Auto</text><text x="855" y="185" class="value">100.856s + 82.598s verify</text>
    <rect x="1160" y="168" width="214" height="22" rx="11" fill="#18c6b3"/>
    <rect x="1374" y="168" width="176" height="22" rx="11" fill="url(#ending)"/>
    <text x="1160" y="222" class="win">25.103% faster first result</text>
    <text x="30" y="267" class="note">Producer alone: 252,534 tokens · 13.367% fewer than Direct. Controller overhead reverses the foreground token result.</text>
  </g>

  <!-- Medium -->
  <g transform="translate(94 585)">
    <rect width="1612" height="300" rx="28" fill="#101f38" stroke="#294568" stroke-width="2"/>
    <text x="30" y="43" class="cardtitle">Medium · Decimal invoice math · 6/6 tests</text>
    <text x="1500" y="42" text-anchor="end" class="win">FIRST RESULT WIN</text>
    <text x="30" y="72" class="route">Auto route: Spark-high · 2 pairs / 4 main runs</text>
    <text x="30" y="108" class="section">LOGICAL TOKENS</text>
    <text x="760" y="108" class="section">FIRST-RESULT TIME</text>

    <text x="30" y="145" class="label">Direct</text><text x="120" y="145" class="value">464,397</text>
    <rect x="420" y="128" width="246" height="22" rx="11" fill="#3b82f6"/>
    <text x="30" y="185" class="label">Auto</text><text x="120" y="185" class="value">176,040 + 467,556</text>
    <rect x="420" y="168" width="93" height="22" rx="11" fill="#8b5cf6"/>
    <rect x="513" y="168" width="248" height="22" fill="#18c6b3"/>
    <rect x="761" y="168" width="49" height="22" rx="11" fill="url(#ending)"/>
    <text x="420" y="222" class="loss">Foreground 38.587% more</text>
    <text x="660" y="222" class="note">Ending +92,658</text>

    <text x="760" y="145" class="label">Direct</text><text x="855" y="145" class="value">167.086s</text>
    <rect x="1160" y="128" width="352" height="22" rx="11" fill="#3b82f6"/>
    <text x="760" y="185" class="label">Auto</text><text x="855" y="185" class="value">145.307s + 39.845s verify</text>
    <rect x="1160" y="168" width="306" height="22" rx="11" fill="#18c6b3"/>
    <rect x="1466" y="168" width="84" height="22" rx="11" fill="url(#ending)"/>
    <text x="1160" y="222" class="win">13.035% faster first result</text>
    <text x="30" y="267" class="note">Producer alone: 467,556 tokens · 0.680% more than Direct. Pairwise results: one win, one loss.</text>
  </g>

  <!-- Complex -->
  <g transform="translate(94 910)">
    <rect width="1612" height="330" rx="28" fill="#10233d" stroke="#2de0c6" stroke-width="2.5"/>
    <text x="30" y="43" class="cardtitle">Complex · three-source workflow audit + semantic merge gate</text>
    <text x="1500" y="42" text-anchor="end" class="win">SCHEDULE + FIRST RESULT WIN</text>
    <text x="30" y="72" class="route">Auto graph: 3× Spark-low source branches → Terra-medium merge · 2 pairs / 4 main runs</text>
    <text x="30" y="108" class="section">LOGICAL TOKENS</text>
    <text x="760" y="108" class="section">FIRST-RESULT TIME</text>

    <text x="30" y="145" class="label">Direct</text><text x="120" y="145" class="value">508,084</text>
    <rect x="420" y="128" width="282" height="22" rx="11" fill="#3b82f6"/>
    <text x="30" y="185" class="label">Auto</text><text x="120" y="185" class="value">137,152 + 445,040</text>
    <rect x="420" y="168" width="76" height="22" rx="11" fill="#8b5cf6"/>
    <rect x="496" y="168" width="247" height="22" fill="#18c6b3"/>
    <rect x="743" y="168" width="66" height="22" rx="11" fill="url(#ending)"/>
    <text x="420" y="222" class="loss">Foreground 14.586% more</text>
    <text x="660" y="222" class="note">Ending +119,322</text>

    <text x="760" y="145" class="label">Direct</text><text x="855" y="145" class="value">158.780s</text>
    <rect x="1160" y="128" width="356" height="22" rx="11" fill="#3b82f6"/>
    <text x="760" y="185" class="label">Auto</text><text x="855" y="185" class="value">107.498s + 66.184s verify</text>
    <rect x="1160" y="168" width="241" height="22" rx="11" fill="#18c6b3"/>
    <rect x="1401" y="168" width="148" height="22" rx="11" fill="url(#ending)"/>
    <text x="1160" y="222" class="win">32.298% faster first result</text>
    <text x="30" y="267" class="win">Producer schedule alone: 445,040 tokens · 12.408% fewer than Direct</text>
    <text x="30" y="298" class="note">Controller +137,152 reverses the token total. Recorded schedule critical path: 72.583% faster than Direct.</text>
  </g>

  <!-- Whole-picture KPI -->
  <g transform="translate(94 1270)">
    <rect width="1612" height="204" rx="28" fill="#0b3438" stroke="#2de0c6" stroke-width="2.5"/>
    <text x="30" y="44" class="cardtitle">Whole picture · 6 pairs</text>
    <line x1="30" y1="63" x2="1580" y2="63" stroke="#2b6971"/>
    <text x="30" y="104" class="kpi">+31.153% foreground tokens</text>
    <text x="30" y="132" class="kpisub">1,263,980 Direct → 492,622 controller + 1,165,130 producer</text>
    <text x="595" y="104" class="kpi">23.205% faster first result</text>
    <text x="595" y="132" class="kpisub">460.525s Direct → 353.661s Auto · Ending excluded</text>
    <text x="1120" y="104" class="kpi">Ending +304,094 · +188.627s</text>
    <text x="1120" y="132" class="kpisub">Auto only · whole: +55.212% tokens · 17.754% slower</text>
    <text x="806" y="177" text-anchor="middle" class="flow">12/12 MAIN CORRECT  ·  MINI TESTS PASS  ·  6/6 ENDING PASS  ·  DIRECT VERIFY = 0</text>
  </g>
</svg>
