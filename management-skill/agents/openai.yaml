interface:
  display_name: "Management Skill"
  short_description: "Routing records, profiles, and eight-skill mirror"
  default_prompt: >-
    $management-skill: do not load for ordinary exact-scoped read-only work or benchmark worker arms. Manage model experience, profiles, or the approved mirror only for an explicit management request or admitted node. Active private learning is the broad Obsidian Model Switch.md page; local model_experience.json and central TaskModelExperience are legacy read-only. Every task stores a 0-100 score. Small low-risk edits try Spark; matching quality failure suppresses that band and upgrades next time. Other pairs downgrade after two Real PASS results and upgrade after quality FAIL. Ending real checks record local evidence and receipt-backed producer verdicts. Never publish private state.
