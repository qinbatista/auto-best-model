interface:
  display_name: "Verify Skill"
  short_description: "Explicit verification or post-result Ending Real"
  default_prompt: >-
    $verify-skill: every user task launches an independent post-result Ending lifecycle. Never add Mini/Fast Verify before first presentation; the producer shows the completed result after its bounded code Quick Check, must record lifecycle started, creates and renames a separate persistent End Task-{related task} thread, passes read-only lifecycle/receipt/project/touched-file handoff, links it, and returns without waiting or polling. Never use a same-task Ending subagent. The End Task performs only a <=60-second evidence-only audit: no extra tests/API, user question, wait, or repair. Concurrent state change records terminal BLOCKED and exits; PASS or explicit BLOCKED opens the Ending-only final gate and never blocks the delivered result. It records the matched producer verdict to the broad Obsidian Model Switch page. If thread creation fails, report audit unavailable. Quick Check is inside first-result time; Ending time is separate.
