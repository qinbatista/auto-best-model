interface:
  display_name: "Verify Skill"
  short_description: "Explicit verification or post-result Ending Real"
  default_prompt: >-
    $verify-skill: every user task launches an independent post-result Ending lifecycle. Never add Mini/Fast Verify before first presentation. After the producer shows the completed result, record lifecycle started and run proportional Real Verify while isolated logs/docs may run in parallel. For a matched adaptive producer receipt, Ending Real alone records its verdict to the matching broad Obsidian `Model Switch.md` page; no local model-learning file or central hierarchy is active, and never record the verifier pair. PASS or explicit BLOCKED opens the final gate. On failure, persist lifecycle evidence and failed durable project state before a new repair child; re-present the correction and use a different Ending verifier. Ending time is separate. ENDING_TASK_WORKER bookkeeping does not recurse unless it produces a repair.
