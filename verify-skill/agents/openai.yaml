interface:
  display_name: "Verify Skill"
  short_description: "Explicit verification or post-result Ending Real"
  default_prompt: >-
    $verify-skill: every user task launches an independent post-result Ending lifecycle. Score it locally. Verification-needed results use ending_verification_plan.py and one persistent End Task-{task}-{check} per independent real unit/integration/API/build/render/state check. Select each verifier model from its own 0-100 score; all required checks must PASS. Never summarize prior evidence instead of running the assigned check. FAIL records exact command/output/error, starts a separate repair task, and then a fresh verifier, up to three attempts. BLOCKED never counts as verified. Store local evidence and repair chain; receipt-backed producer PASS/FAIL syncs Obsidian. Never let a verifier repair its own target or use a same-task subagent.
