interface:
  display_name: "Verify Skill"
  short_description: "Explicit verification or post-result Ending Real"
  default_prompt: >-
    $verify-skill: use only for explicitly requested verification or post-result Ending Real. Never add Mini/Fast Verify before first presentation. When verification is the requested task, return its result normally; otherwise load only after the producer presents the completed result. Run proportional Real Verify in Ending Task, exclude Ending time from first-result time, notify and reopen on failure, and require a different verifier for independent optimization proof.
