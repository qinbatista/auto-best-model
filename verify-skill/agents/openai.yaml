interface:
  display_name: "Verify Skill"
  short_description: "Explicit verification or post-result Ending Real"
  default_prompt: >-
    $verify-skill: every user task launches an independent post-result Ending lifecycle. Never add Mini/Fast Verify before first presentation; the producer shows the completed result after its bounded code Quick Check, records lifecycle started, creates and renames a separate persistent End Task-{related task} thread, passes the lifecycle/receipt/acceptance/project/touched-file handoff, links it, and returns without waiting or polling. Never use a same-task Ending subagent. The End Task runs proportional Real Verify; isolated logs/docs may run in parallel. PASS or explicit BLOCKED opens the final gate, and the End Task must persist lifecycle evidence before a new repair child uses a different Ending verifier. It records the matched producer verdict to the broad Obsidian Model Switch page and writes project memory after PASS/BLOCKED. If thread creation fails, report BLOCKED. Quick Check is inside first-result time; Ending time is separate.
